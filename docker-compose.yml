services:
  # 💾 1. Banco de Dados Postgres da ARSAL
  postgres-db:
    image: postgres:15-alpine
    container_name: arsal-postgres
    environment:
      POSTGRES_DB: tv_corporativa
      POSTGRES_USER: andre
      POSTGRES_PASSWORD: arsal@password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ☕ 2. Backend Spring Boot (Java) - Sem MinIO e com volume de mídia local!
  api-server:
    build: ./tv-corporativa-api
    container_name: arsal-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/tv_corporativa
      - SPRING_DATASOURCE_USERNAME=andre
      - SPRING_DATASOURCE_PASSWORD=arsal@password
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=2000MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=2000MB
    volumes:
      # Mapeia a pasta de vídeos de dentro do contêiner para uma pasta real no HD do servidor
      - pasta_videos:/app/uploads

  # 🌐 3. Frontend Angular
  web-tv:
    build:
      context: .
      dockerfile: ./tv-corporativa-frontend/Dockerfile
    container_name: arsal-front
    ports:
      - "80:80"
    depends_on:
      - api-server

volumes:
  postgres_data:
  pasta_videos: # Novo volume seguro para os vídeos