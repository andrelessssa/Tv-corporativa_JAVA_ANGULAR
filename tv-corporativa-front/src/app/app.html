<mat-toolbar color="primary" style="box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
  <button mat-icon-button (click)="drawer.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span>ARSAL - Gestão de TV</span>
</mat-toolbar>

<mat-sidenav-container style="height: calc(100vh - 64px);">
  
  <mat-sidenav #drawer mode="side" opened style="width: 200px; background: #fff; border-right: 1px solid #ddd;">
    <mat-nav-list>
      <a mat-list-item href="#"> <mat-icon>tv</mat-icon> Grade </a>
      <a mat-list-item href="#"> <mat-icon>add</mat-icon> Novo </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content style="padding: 20px; background-color: #f5f5f5;">
    <app-lista-midias></app-lista-midias>
  </mat-sidenav-content>

</mat-sidenav-container>
