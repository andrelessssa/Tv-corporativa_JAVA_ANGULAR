<mat-toolbar class="header-arsal">
  <span class="titulo-header">Gestão de TV - ARSAL</span>
</mat-toolbar>

<mat-sidenav-container class="container-principal">
  
  <mat-sidenav mode="side" opened class="menu-lateral">
    
    <div class="layout-menu">
      
      <div class="menu-topo">
        <div class="menu-perfil">
          <mat-icon class="icone-gigante">account_circle</mat-icon>
          <p class="nome-perfil">Olá, <strong>André</strong></p>
          <small class="cargo-perfil">Administrador</small>
        </div>

        <mat-nav-list>
          <a mat-list-item routerLink="/grade">
            <mat-icon class="icone-azul">tv</mat-icon>
            <span class="texto-menu">Grade de TV</span>
          </a>
          <a mat-list-item routerLink="/novo">
            <mat-icon class="icone-azul">desktop_windows</mat-icon>
            <span class="texto-menu">Terminais Online</span>
          </a>
        </mat-nav-list>
      </div>

      <div class="menu-rodape">
        <mat-nav-list>
          <a mat-list-item href="#">
            <mat-icon class="icone-vermelho">logout</mat-icon>
            <span class="texto-menu texto-vermelho">Sair do Sistema</span>
          </a>
        </mat-nav-list>
      </div>

    </div>
  </mat-sidenav>

<mat-sidenav-content class="area-conteudo">
    
    <router-outlet></router-outlet>

  </mat-sidenav-content>

</mat-sidenav-container>
