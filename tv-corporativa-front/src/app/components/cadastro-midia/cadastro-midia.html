<div class="container-cadastro-gemini">
  
  <mat-card class="cartao-gemini mat-elevation-z0">
    
    <mat-card-header class="header-gemini">
      <mat-icon class="icone-titulo-gemini">add_to_queue</mat-icon>
      <div>
        <mat-card-title class="titulo-gemini">Cadastrar Nova Fonte de Mídia</mat-card-title>
        <mat-card-subtitle class="subtitle-gemini">Configure os detalhes para a TV ARSAL</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content class="conteudo-gemini">
      
      <div class="prompt-midia">
        <mat-form-field appearance="outline" class="campo-capsule campo-nome-gemini">
          <mat-icon matPrefix class="icone-input-gemini icone-add">add</mat-icon>
          <input matInput placeholder="Ex: Vídeo Institucional da ARSAL" [(ngModel)]="novaMidia.nome">
          <mat-icon matSuffix class="icone-input-gemini">settings</mat-icon>
          <mat-label class="label-gemini">Nome da Mídia</mat-label>
        </mat-form-field>
      </div>

      <div class="linha-gemini">
        
        <div class="campo-tipo-gemini">
          <label class="label-input-gemini">Tipo de Arquivo</label>
          <mat-button-toggle-group [(ngModel)]="novaMidia.tipo" name="tipoMidia" class="toggle-gemini mat-elevation-z1">
            <mat-button-toggle value="MP4">
              <mat-icon class="icone-toggle">video_library</mat-icon> MP4
            </mat-button-toggle>
            <mat-button-toggle value="JPG">JPG</mat-button-toggle>
            <mat-button-toggle value="PNG">PNG</mat-button-toggle>
          </mat-button-toggle-group>
        </div>

        <mat-form-field appearance="outline" class="campo-capsule campo-tempo-gemini">
          <mat-label class="label-gemini">Duração (Seg)</mat-label>
          <input matInput type="number" [(ngModel)]="novaMidia.duracaoSegundos">
          <mat-icon matSuffix class="icone-input-gemini icone-timer">timer</mat-icon>
        </mat-form-field>

      </div>

      <mat-form-field appearance="outline" class="campo-capsule campo-total-gemini">
        <mat-label class="label-gemini">URL Completa do Arquivo</mat-label>
        <input matInput placeholder="http://servidor/video.mp4" [(ngModel)]="novaMidia.url">
        <mat-icon matSuffix class="icone-input-gemini icone-link">link</mat-icon>
      </mat-form-field>

    </mat-card-content>

    <mat-card-actions class="acoes-gemini">
      <button mat-button class="botao-cancelar-gemini">Cancelar</button>
      <button mat-raised-button class="botao-salvar-gemini mat-elevation-z1" (click)="salvar()">
        <mat-icon>save</mat-icon>
        Salvar Mídia
      </button>
    </mat-card-actions>

  </mat-card>

</div>
