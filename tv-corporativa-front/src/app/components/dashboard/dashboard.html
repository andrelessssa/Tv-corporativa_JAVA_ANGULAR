<main class="main fade-in">
  <div class="page-header">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-sub">Visão geral do sistema — ARSAL</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost">📥 Relatório</button>
      <button class="btn btn-primary">＋ Novo Conteúdo</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card s1">
      <div class="stat-icon">🎬</div>
      <div class="stat-value">{{ totalVideos }}</div>
      <div class="stat-label">Vídeos ativos</div>
      <div class="stat-change up">↑ +3 esta semana</div>
    </div>

    <div class="stat-card s2">
      <div class="stat-icon">📡</div>
      <div class="stat-value">8</div>
      <div class="stat-label">TVs conectadas</div>
      <div class="stat-change up">↑ 7 online agora</div>
    </div>

    <div class="stat-card s3">
      <div class="stat-icon">▶️</div>
      <div class="stat-value">98%</div>
      <div class="stat-label">Uptime mensal</div>
      <div class="stat-change up">↑ Ótimo</div>
    </div>
  </div>
</main>
