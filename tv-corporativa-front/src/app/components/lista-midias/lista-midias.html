<div class="container">
  <h2 class="titulo">📺 Programação da TV ARSAL</h2>

  <table mat-table [dataSource]="listaDeVideos" class="mat-elevation-z8 tabela-arsal">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let video"> <strong>#{{ video.id }}</strong> </td>
    </ng-container>

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef> Nome do Vídeo </th>
      <td mat-cell *matCellDef="let video"> {{ video.nome }} </td>
    </ng-container>

    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef> Tipo </th>
      <td mat-cell *matCellDef="let video"> <span class="badge">{{ video.tipo }}</span> </td>
    </ng-container>

    <ng-container matColumnDef="duracao">
      <th mat-header-cell *matHeaderCellDef> Duração </th>
      <td mat-cell *matCellDef="let video"> ⏱️ {{ video.duracaoSegundos }} seg </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>

  @if (listaDeVideos.data.length === 0) {
    <div class="vazio mat-elevation-z8">
      Nenhum vídeo cadastrado na ARSAL ainda. 😢
    </div>
  }
</div>
