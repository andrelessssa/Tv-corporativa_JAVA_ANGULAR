<div class="container-lista-gemini">
  
  <mat-card class="cartao-lista mat-elevation-z0">
    <mat-card-header class="header-lista">
      <mat-icon class="icone-titulo">format_list_bulleted</mat-icon>
      <div>
        <mat-card-title class="titulo-lista">Programação Atual</mat-card-title>
        <mat-card-subtitle>Gerencie os conteúdos exibidos nos terminais ARSAL</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <table mat-table [dataSource]="listaDeVideos" class="tabela-gemini">

        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef> Conteúdo </th>
          <td mat-cell *matCellDef="let video"> 
            <span class="nome-video">{{ video.nome }}</span> 
          </td>
        </ng-container>

        <ng-container matColumnDef="tipo">
          <th mat-header-cell *matHeaderCellDef> Formato </th>
          <td mat-cell *matCellDef="let video"> 
            <span class="badge-gemini">{{ video.tipo }}</span> 
          </td>
        </ng-container>

        <ng-container matColumnDef="duracao">
          <th mat-header-cell *matHeaderCellDef> Duração </th>
          <td mat-cell *matCellDef="let video" class="texto-secundario"> 
            <mat-icon class="mini-icone">schedule</mat-icon> {{ video.duracaoSegundos }}s 
          </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef class="celula-centro"> Ações </th>
          <td mat-cell *matCellDef="let video" class="celula-centro">
            <button mat-icon-button class="botao-lixeira" (click)="excluirVideo(video.id)">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
        <tr mat-row *matRowDef="let row; columns: colunasExibidas;" class="linha-tabela"></tr>
      </table>

      @if (listaDeVideos.data.length === 0) {
        <div class="vazio-gemini">
          <mat-icon>cloud_off</mat-icon>
          <p>Nenhuma mídia encontrada na nuvem da ARSAL.</p>
        </div>
      }
    </mat-card-content>

    <mat-card-actions class="acoes-lista">
      <button mat-raised-button class="botao-novo-gemini" routerLink="/novo">
      <mat-icon>add</mat-icon>
      Cadastrar Novo Vídeo
    </button>
    </mat-card-actions>
  </mat-card>

</div>
