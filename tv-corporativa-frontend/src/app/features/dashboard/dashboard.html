<div class="dashboard-header">
  <h1>Monitoramento Geral</h1>
  <p>Status em tempo real da rede de TVs ARSAL</p>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon indigo">📺</div>
    <div class="stat-data">
      <span class="stat-value">0</span>
      <span class="stat-label">TVs Online</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon green">🎬</div>
    <div class="stat-data">
      <span class="stat-value">{{ totalVideos }}</span>
      <span class="stat-label">Vídeos na Playlist</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon orange">⚠️</div>
    <div class="stat-data">
      <span class="stat-value">0</span>
      <span class="stat-label">Alertas de Rede</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon pink">📊</div>
    <div class="stat-data">
      <span class="stat-value">0%</span>
      <span class="stat-label">Uptime Mensal</span>
    </div>
  </div>
</div>
