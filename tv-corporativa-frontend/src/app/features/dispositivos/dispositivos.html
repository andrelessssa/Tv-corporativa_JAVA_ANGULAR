<div class="dispositivos-header">
  <h1>Dispositivos na Rede</h1>
  <p>Monitorando TVs conectadas na rede local ARSAL</p>
</div>

<div class="device-grid">
  <div class="device-card online">
    <div class="status-indicator"></div>
    <div class="device-icon">🖥️</div>
    <div class="device-info">
      <h3>TV Recepção Principal</h3>
      <p class="ip">IP: 192.168.1.105</p>
      <span class="playing">Transmitindo: Institucional_V1.mp4</span>
    </div>
    <div class="uptime">Uptime: 14h 22m</div>
  </div>

  <div class="device-card offline">
    <div class="status-indicator"></div>
    <div class="device-icon">🖥️</div>
    <div class="device-info">
      <h3>TV Sala de Reuniões</h3>
      <p class="ip">IP: 192.168.1.110</p>
      <span class="playing">Desconectado</span>
    </div>
    <div class="uptime">Última vez vista: 2h atrás</div>
  </div>
</div>
