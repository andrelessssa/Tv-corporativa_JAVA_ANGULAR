<div class="login-container">
  <div class="login-card">
    <h2>📺 TV Corporativa ARSAL</h2>
    <p>Introduza as credenciais de acesso</p>

    <!-- 1. O Form começa AQUI, abraçando os campos e o botão -->
    <form (ngSubmit)="efetuarLogin()">

      <div class="input-group">
        <label>Utilizador</label>
        <!-- Adicionado o atributo name="usuario" 🎯 -->
        <input type="text" name="usuario" [(ngModel)]="usuario" placeholder="Ex: admin ou tv">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <!-- Adicionado o atributo name="senha" 🎯 -->
        <input type="password" name="senha" [(ngModel)]="senha" placeholder="••••••••">
      </div>

      <!-- 2. O botão agora é type="submit" e não tem mais o (click) -->
      <button type="submit" class="btn-login">Entrar no Sistema 🚀</button>

    </form> <!-- 3. O Form fecha AQUI -->

  </div>
</div>
